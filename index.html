<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Extrator NFe - Formato BR</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background: #f4f7f6; color: #333; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2, h3 { color: #2c3e50; border-bottom: 2px solid #eee; padding-bottom: 8px; margin-top: 30px; }
        .upload-box { border: 2px dashed #3498db; padding: 20px; text-align: center; margin-bottom: 20px; border-radius: 8px; background: #ebf5fb; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 10px; }
        .card { background: #fff; border: 1px solid #ddd; padding: 10px; border-radius: 5px; display: flex; justify-content: space-between; align-items: center; }
        .label { font-size: 0.75rem; font-weight: bold; color: #7f8c8d; display: block; text-transform: uppercase; }
        .value { font-size: 0.9rem; font-weight: 500; }
        button { cursor: pointer; background: #3498db; color: white; border: none; padding: 6px 12px; border-radius: 4px; font-size: 0.75rem; }
        button:hover { background: #2980b9; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.8rem; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background: #f8f9fa; }
        tr:hover { background: #f9f9f9; }
    </style>
</head>
<body>

<div class="container">
    <h2>Extrator de XML NFe</h2>
    <div class="upload-box">
        <p>Selecione o arquivo XML da Nota Fiscal</p>
        <input type="file" id="xmlInput" accept=".xml">
    </div>

    <div id="resultado"></div>
</div>

<script>
    // Função para formatar data de AAAA-MM-DD para DD/MM/AAAA
    function formatarDataBR(dataISO) {
        if (!dataISO || dataISO === "---") return "---";
        const partes = dataISO.split('-');
        return `${partes[2]}/${partes[1]}/${partes[0]}`;
    }

    // Função para formatar moeda
    function formatarMoeda(valor) {
        if (!valor || valor === "---") return "---";
        return parseFloat(valor).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
    }

    document.getElementById('xmlInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            const parser = new DOMParser();
            const xml = parser.parseFromString(e.target.result, "text/xml");
            const getT = (tag, root = xml) => root.getElementsByTagName(tag)[0]?.textContent || "---";

            let res = "<h3>Dados Gerais e Emitente</h3>";
            res += `<div class='grid'>
                ${cCard("Chave de Acesso", getT("chNFe"))}
                ${cCard("Número da Nota", getT("nNF"))}
                ${cCard("Data Emissão", formatarDataBR(getT("dhEmi").substring(0,10)))}
                ${cCard("Valor Total", formatarMoeda(getT("vNF")))}
                ${cCard("Emitente", getT("xNome"))}
                ${cCard("CNPJ", getT("CNPJ"))}
                ${cCard("Inscr. Estadual", getT("IE"))}
            </div>`;

            // SEÇÃO DE COBRANÇA (FATURAS)
            const dups = xml.getElementsByTagName("dup");
            if(dups.length > 0) {
                res += "<h3>Dados de Cobrança (Faturas)</h3><div class='grid'>";
                Array.from(dups).forEach(d => {
                    const vencimentoBR = formatarDataBR(getT("dVenc", d));
                    const valorBR = formatarMoeda(getT("vDup", d));
                    const nParcela = getT("nDup", d);
                    
                    res += cCard(`Parcela ${nParcela}`, `${vencimentoBR} - ${valorBR}`);
                });
                res += "</div>";
            }

            // SEÇÃO DE ITENS
            const itens = xml.getElementsByTagName("det");
            res += "<h3>Itens da Nota (Produtos)</h3>";
            res += "<table><thead><tr>" + 
                   "<th>Item</th><th>Produto</th><th>EAN</th><th>NCM</th><th>CEST</th><th>CFOP</th><th>Qtd</th><th>V. Unit</th>" +
                   "</tr></thead><tbody>";

            Array.from(itens).forEach(i => {
                const nItem = i.getAttribute("nItem");
                const p = i.getElementsByTagName("prod")[0];
                
                res += `<tr>
                    <td>${nItem}</td>
                    <td>${getT("xProd", p)}</td>
                    <td>${getT("cEAN", p)}</td>
                    <td>${getT("NCM", p)}</td>
                    <td>${getT("CEST", p)}</td>
                    <td>${getT("CFOP", p)}</td>
                    <td>${getT("qCom", p)}</td>
                    <td>${formatarMoeda(getT("vUnCom", p))}</td>
                </tr>`;
            });
            res += "</tbody></table>";

            document.getElementById('resultado').innerHTML = res;
        };
        reader.readAsText(file);
    });

    function cCard(label, valor) {
        return `<div class="card">
            <div><span class="label">${label}</span><span class="value">${valor}</span></div>
            <button onclick="copiar('${valor}')">Copiar</button>
        </div>`;
    }

    function copiar(t) {
        navigator.clipboard.writeText(t);
    }
</script>
</body>
</html>
